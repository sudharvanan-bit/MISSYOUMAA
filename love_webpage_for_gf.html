<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>For My Love ❤️</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', cursive;
      background: linear-gradient(to right, #ff9a9e, #fecfef);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }

    .container {
      text-align: center;
      background: rgba(255, 255, 255, 0.85);
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      max-width: 400px;
      z-index: 2;
    }

    h1 {
      color: #ff4d6d;
    }

    button {
      margin-top: 20px;
      padding: 10px 20px;
      border: none;
      border-radius: 20px;
      background-color: #ff4d6d;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background-color: #e63956;
    }

    .hidden {
      display: none;
    }

    .letter {
      font-size: 18px;
      color: #333;
      line-height: 1.6;
      margin-top: 20px;
      white-space: pre-line;
      min-height: 120px;
    }

    /* Floating Hearts */
    .heart {
      position: absolute;
      bottom: -20px;
      color: #ff4d6d;
      font-size: 20px;
      animation: floatUp 6s linear infinite;
      opacity: 0.8;
    }

    @keyframes floatUp {
      0% {
        transform: translateY(0) scale(1);
        opacity: 0.8;
      }
      100% {
        transform: translateY(-100vh) scale(1.5);
        opacity: 0;
      }
    }
  </style>
</head>
<body>

  <!-- Audio -->
  <audio id="bgMusic" loop autoplay muted>
    <source src="song.mp3" type="audio/mpeg">
  </audio>

  <div class="container" id="firstPage">
    <h1>MAA MAA ME WANT TO REMIND YOU ONE THING 💖</h1>
    <button onclick="showMessage()">OK</button>
  </div>

  <div class="container hidden" id="secondPage">
    <h1>For You ❤️</h1>
    <div class="letter" id="typedText"></div>
  </div>

  <script>
    const message = `MAA MAAA ME SO PROUD OF YOU MAA ❤️
MAA MAA DOING REALLY GREAT ❤️
YOU ARE A WOMAN MAA MAA ❤️
ETHA IRUNTHALUM PAATHUKULAM MAA MAA ❤️
MISS YOU MAA MAA ❤️`;

    let hasTyped = false;

    function showMessage() {
      document.getElementById('firstPage').classList.add('hidden');
      document.getElementById('secondPage').classList.remove('hidden');

      const music = document.getElementById('bgMusic');
      music.currentTime = 0; // start from beginning
      music.muted = false;   // unmute after click
      music.play();

      // Only type once, then keep it displayed permanently
      if (!hasTyped) {
        typeText();
        hasTyped = true;
      }
    }

    function typeText() {
      let i = 0;
      const speed = 50; // typing speed (lower = faster)
      const target = document.getElementById('typedText');

      function typing() {
        if (i < message.length) {
          target.innerHTML += message.charAt(i);
          i++;
          setTimeout(typing, speed);
        }
      }

      typing();
    }

    // Floating hearts
    function createHeart() {
      const heart = document.createElement('div');
      heart.classList.add('heart');
      heart.innerHTML = '❤️';
      heart.style.left = Math.random() * 100 + 'vw';
      heart.style.fontSize = (Math.random() * 20 + 10) + 'px';
      heart.style.animationDuration = (Math.random() * 3 + 3) + 's';

      document.body.appendChild(heart);

      setTimeout(() => {
        heart.remove();
      }, 6000);
    }

    setInterval(createHeart, 300);
  </script>

</body>
</html>
