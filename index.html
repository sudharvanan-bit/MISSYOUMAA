<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Love ❤️</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    font-family:Arial, sans-serif;
    text-align:center;
    color:white;
    height:100vh;
    width:100vw;
    background:
    linear-gradient(rgba(255,20,147,0.4), rgba(255,105,180,0.4)),
    url('https://images.unsplash.com/photo-1518199266791-5375a83190b7?q=80&w=1974&auto=format&fit=crop');
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
}

.overlay{
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.25);
    top:0;
    left:0;
    z-index:0;
}

.main-content{
    position:relative;
    z-index:2;
}

h1{
    margin-top:25px;
    font-size:55px;
    text-shadow:0 0 15px pink;
}

#score{
    font-size:35px;
    margin-top:20px;
    font-weight:bold;
    text-shadow:0 0 10px black;
}

#message{
    margin-top:25px;
    font-size:42px;
    font-weight:bold;
    padding:10px;
    min-height:90px;
    animation: pop 0.3s ease;
    text-shadow:0 0 10px black;
}

@keyframes pop{
    0%{
        transform:scale(0.5);
        opacity:0;
    }
    100%{
        transform:scale(1);
        opacity:1;
    }
}

.heart{
    position:absolute;
    font-size:50px;
    cursor:pointer;
    user-select:none;
    z-index:5;
    animation: glow 1s infinite alternate;
}

@keyframes glow{
    from{
        filter:drop-shadow(0 0 5px white);
    }
    to{
        filter:drop-shadow(0 0 20px pink);
    }
}

#finalScreen{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:
    linear-gradient(rgba(255,20,147,0.9),
    rgba(255,105,180,0.9));

    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    z-index:1000;
}

#finalScreen h2{
    font-size:70px;
    margin-bottom:20px;
    text-shadow:0 0 20px white;
}

#finalScreen p{
    font-size:32px;
    width:80%;
    line-height:1.6;
}

button{
    margin-top:30px;
    padding:18px 35px;
    border:none;
    border-radius:40px;
    font-size:22px;
    cursor:pointer;
    background:white;
    color:#ff1493;
    font-weight:bold;
    transition:0.3s;
}

button:hover{
    transform:scale(1.1);
}

.floating-heart{
    position:absolute;
    color:white;
    opacity:0.3;
    animation: floatUp linear infinite;
}

@keyframes floatUp{
    from{
        transform:translateY(100vh);
    }
    to{
        transform:translateY(-120vh);
    }
}

</style>
</head>

<body>

<div class="overlay"></div>

<div class="main-content">

<h1>Catch The Hearts ❤️</h1>

<div id="score">Score: 0 / 20</div>

<div id="message">Catch the hearts maa 💕</div>

</div>

<div id="finalScreen">
    <h2>I LOVE YOU ❤️</h2>

    <p>
        You completed the game princess 🥺💕<br><br>

        Thank you for being the cutest,
        sweetest, most beautiful girl
        in my life ❤️<br><br>

        Forever yours 💖
    </p>

    <button onclick="restartGame()">Play Again 💖</button>
</div>

<!-- MUSIC -->
<audio id="bgMusic" autoplay>
    <source src="YOUR-SONG.mp3" type="audio/mp3">
</audio>

<script>

let score = 0;

const compliments = {

1: "Maa maa so gorgeous 💖",
2: "You so cute 😍",
3: "Your smile melts my heart ❤️",
4: "You are my happiness 🌸",
5: "Most beautiful girl ever 🥺",
6: "I’m lucky to have you 💕",
7: "Princess energy 👑",
8: "You are my safe place ❤️",
9: "Your eyes are so pretty ✨",
10: "I can stare at you forever 😭💕",
11: "You make my life better ❤️",
12: "Cutest human alive 😚",
13: "My heart belongs to you 💘",
14: "You are sweeter than chocolate 🍫",
15: "I love your laugh so much 😂❤️",
16: "The most hottest woman i ever seen 💭💕",
17: "I never wanna lose you 🥺",
18: "You make everything special 🌹",
19: "Forever my favorite person ❤️",
20: "I LOVE YOU SO MUCH MAA MAA 💍❤️"

};

function createHeart(){

    if(score >= 20){
        return;
    }

    const heart = document.createElement("div");

    heart.classList.add("heart");

    heart.innerHTML = "💖";

    heart.style.left =
        Math.random() * (window.innerWidth - 50) + "px";

    heart.style.top = "-50px";

    document.body.appendChild(heart);

    let topPos = -50;

    const speed = Math.random() * 3 + 2;

    const move = setInterval(() => {

        topPos += speed;

        heart.style.top = topPos + "px";

        if(topPos > window.innerHeight){

            clearInterval(move);

            heart.remove();

        }

    }, 20);

    heart.addEventListener("click", () => {

        clearInterval(move);

        heart.remove();

        score++;

        document.getElementById("score").innerText =
            "Score: " + score + " / 20";

        document.getElementById("message").innerText =
            compliments[score];

        if(score === 20){

            setTimeout(() => {

                document.getElementById("finalScreen").style.display =
                    "flex";

            }, 500);

        }

    });

}

function restartGame(){

    score = 0;

    document.getElementById("score").innerText =
        "Score: 0 / 20";

    document.getElementById("message").innerText =
        "Catch the hearts baby 💕";

    document.getElementById("finalScreen").style.display =
        "none";

}

setInterval(createHeart, 700);

function createFloatingHearts(){

    const heart = document.createElement("div");

    heart.classList.add("floating-heart");

    heart.innerHTML = "💗";

    heart.style.left = Math.random() * 100 + "vw";

    heart.style.fontSize =
        Math.random() * 30 + 20 + "px";

    heart.style.animationDuration =
        Math.random() * 10 + 5 + "s";

    document.body.appendChild(heart);

    setTimeout(() => {
        heart.remove();
    }, 15000);

}

setInterval(createFloatingHearts, 500);

/* AUTO PLAY MUSIC */

const music = document.getElementById("bgMusic");

window.addEventListener("click", () => {

    music.play();

}, { once:true });

</script>

</body>
</html>
