<!DOCTYPE html>
<html>
<head>
<title>Thank You Maa ❤️</title>

<style>
body {
    margin: 0;
    font-family: 'Comic Sans MS', cursive;
    background: linear-gradient(to bottom, #ff9a9e, #fecfef);
    text-align: center;
    overflow: hidden;
    color: white;
}

p {
    width: 80%;
    margin: auto;
    font-size: 20px;
}

/* hearts */
.heart {
    position: absolute;
    font-size: 20px;
    animation: fall linear infinite;
}
@keyframes fall {
    0% {transform: translateY(-10px);}
    100% {transform: translateY(100vh);}
}
</style>
</head>

<body>

<h1>Thank You Maa 💖</h1>

<p>
Thanks Maa for everything. I'm really grateful to have you in my life Maa.
You are the most perfect, gorgeous, hottest, smartest woman I ever met Maa.
I really love you Maa and I really miss you Maa. Paathu patram Maa ❤️
</p>

<button onclick="back()">Back</button>

<audio id="bgMusic" loop autoplay>
    <source src="song.mp3" type="audio/mpeg">
</audio>

<script>
function back() {
    window.location.href = "index.html";
}

// CONTINUE MUSIC
window.onload = function () {
    if (localStorage.getItem("music") === "on") {
        document.getElementById("bgMusic").play();
    }
};

// HEARTS
function createHeart() {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerText = "❤️";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.animationDuration = (Math.random() * 3 + 2) + "s";
    document.body.appendChild(heart);
    setTimeout(() => heart.remove(), 5000);
}
setInterval(createHeart, 300);
</script>

</body>
</html>
